[plugins.postgres]
version = "15"

[env]
DATABASE_URL = "${{ Plugins.Postgres.DATABASE_URL }}"
```

## Monitoring & Rollback

```bash
# View logs
railway logs --follow

# View in dashboard
# Project → Deployments → View logs

# Rollback if needed
railway rollback <deployment-id>

# Check metrics
railway status
```

## Scaling Configuration

**For high traffic, adjust in Railway dashboard:**

- **Dyno Type**: `Standard` (recommended for production)
- **Replicas**: 1-3 (start with 1, scale up as needed)
- **Memory**: 512MB (default), increase to 1GB for large CSVs

